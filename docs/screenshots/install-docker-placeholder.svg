<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Docker install screenshot placeholder">
  <rect width="1200" height="700" rx="28" fill="#f8f6f1"/>
  <rect x="48" y="48" width="1104" height="604" rx="24" fill="#fffdfb" stroke="#d7cab5" stroke-width="3"/>
  <text x="88" y="130" fill="#1d1a16" font-family="Georgia, serif" font-size="54" font-weight="700">Docker install screenshot placeholder</text>
